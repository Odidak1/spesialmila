<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maafin Aku 🥺</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --plum:      #2D0035;
  --deep:      #4A0060;
  --mauve:     #C77DFF;
  --blush:     #FFB6C1;
  --rose:      #E8A0BF;
  --cream:     #FFF0F5;
  --accent:    #FF6FA8;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(ellipse at 30% 0%, #4A0060 0%, #2D0035 55%, #1a001f 100%);
  color: var(--cream);
  font-family: 'Nunito', sans-serif;
  touch-action: none;
}

/* ── PETALS ── */
.petal {
  position: fixed;
  top: -40px;
  pointer-events: none;
  user-select: none;
  animation: drift linear forwards;
  opacity: 0;
  font-size: 18px;
  z-index: 0;
}

@keyframes drift {
  0%   { transform: translateY(0)   translateX(0)   rotate(0deg);   opacity: 0; }
  8%   { opacity: .9; }
  85%  { opacity: .7; }
  100% { transform: translateY(108vh) translateX(var(--sway)) rotate(360deg); opacity: 0; }
}

/* ── SHIMMER OVERLAY ── */
.shimmer-ring {
  position: absolute;
  inset: -2px;
  border-radius: 26px;
  background: conic-gradient(from 0deg, #C77DFF, #FF6FA8, #FFB6C1, #E8A0BF, #C77DFF);
  animation: spin 4s linear infinite;
  z-index: -1;
  filter: blur(3px);
  opacity: .55;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── PAGE 1 ── */
#page1 {
  position: relative;
  z-index: 1;
  height: 100dvh;
  height: 100vh; /* fallback */
  display: none;
  justify-content: center;
  align-items: center;
  padding: 24px 20px;
}

.card-wrap {
  position: relative;
  width: 100%;
  max-width: 340px;
}

.card {
  position: relative;
  z-index: 1;
  background: rgba(255, 240, 245, 0.08);
  border-radius: 24px;
  padding: 32px 24px 28px;
  text-align: center;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,182,193,0.25);
}

.emoji-top {
  font-size: 52px;
  display: block;
  margin-bottom: 12px;
  animation: bob 2.5s ease-in-out infinite;
}

@keyframes bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

.card h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  line-height: 1.45;
  margin-bottom: 8px;
  color: var(--cream);
  text-shadow: 0 0 20px rgba(199,125,255,.6);
}

.card p {
  font-size: 13px;
  color: rgba(255,240,245,.55);
  margin-bottom: 26px;
  font-style: italic;
}

/* button container so NO has space to run */
.btn-area {
  position: relative;
  min-height: 110px;
  width: 100%;
}

#yes {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, #FF6FA8, #C77DFF);
  color: #fff;
  box-shadow: 0 4px 20px rgba(255,111,168,.5);
  letter-spacing: .3px;
  transition: transform .15s, box-shadow .15s;
}

#yes:active {
  transform: scale(.97);
  box-shadow: 0 2px 10px rgba(255,111,168,.4);
}

#no {
  position: absolute;
  /* start below yes button */
  top: 52px;
  left: 0;
  right: 0;
  margin: 0 auto;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  background: rgba(255,255,255,.07);
  color: rgba(255,240,245,.6);
  border: 1px solid rgba(255,182,193,.2);
  transition: left .1s, top .1s;
  z-index: 10;
}

/* ── PAGE 2 ── */
#page2 {
  display: flex;
  position: relative;
  z-index: 1;
  height: 100dvh;
  height: 100vh;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px 16px;
  gap: 18px;
}

.magic-label {
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--mauve);
  text-shadow: 0 0 12px rgba(199,125,255,.7);
}

.calc-shell {
  width: 100%;
  max-width: 300px;
  background: rgba(255,240,245,.06);
  border: 1px solid rgba(255,182,193,.2);
  border-radius: 22px;
  padding: 18px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

#display {
  display: block;
  width: 100%;
  height: 48px;
  text-align: right;
  font-size: 16px;
  padding: 0 12px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,182,193,.2);
  border-radius: 12px;
  background: rgba(45,0,53,.6);
  color: var(--mauve);
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
  outline: none;
  caret-color: transparent;
}

.calc-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.calc-btn {
  height: 52px;
  border: none;
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  background: rgba(255,240,245,.08);
  color: var(--cream);
  border: 1px solid rgba(255,182,193,.12);
  transition: background .12s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}

.calc-btn:active {
  background: rgba(199,125,255,.25);
  transform: scale(.93);
}

.calc-btn.op {
  background: rgba(199,125,255,.18);
  color: var(--mauve);
}

.calc-btn.eq {
  background: linear-gradient(135deg, #FF6FA8, #C77DFF);
  color: #fff;
  box-shadow: 0 3px 14px rgba(255,111,168,.45);
}

.calc-btn.cl {
  background: rgba(255,111,168,.15);
  color: var(--blush);
}

.result-note {
  font-size: 12px;
  color: rgba(255,240,245,.35);
  font-style: italic;
}

/* ── ERROR POPUP ── */
#error-popup {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 30px;
}

.error-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.error-box {
  position: relative;
  z-index: 1;
  background: #1a0020;
  border: 1px solid rgba(255,100,100,.35);
  border-radius: 20px;
  padding: 24px 22px 20px;
  max-width: 280px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,50,50,.2), 0 8px 32px rgba(0,0,0,.5);
  animation: popIn .3s cubic-bezier(.36,.07,.19,.97) both;
}

@keyframes popIn {
  0%   { transform: scale(.7); opacity: 0; }
  70%  { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(1); }
}

.error-icon {
  font-size: 44px;
  display: block;
  margin-bottom: 10px;
  animation: shake .4s ease .2s both;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px) rotate(-3deg); }
  40%      { transform: translateX(6px)  rotate(3deg); }
  60%      { transform: translateX(-4px) rotate(-2deg); }
  80%      { transform: translateX(4px)  rotate(2deg); }
}

.error-title {
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #ff6b6b;
  margin-bottom: 6px;
}

.error-msg {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: var(--cream);
  margin-bottom: 6px;
  line-height: 1.4;
}

.error-sub {
  font-size: 12px;
  color: rgba(255,240,245,.4);
  margin-bottom: 18px;
  font-style: italic;
}

.error-btn {
  display: block;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, #FF6FA8, #C77DFF);
  color: #fff;
  box-shadow: 0 3px 14px rgba(255,111,168,.4);
}

/* ── DISPLAY special state ── */
#display.love-state {
  font-size: 11px;
  text-align: center;
  color: #FF6FA8;
  letter-spacing: .5px;
  text-shadow: 0 0 10px rgba(255,111,168,.6);
}

/* ── WHATSAPP BUTTON ── */
#wa-btn {
  display: none;
  width: 100%;
  max-width: 300px;
  padding: 14px 16px;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: #fff;
  box-shadow: 0 4px 20px rgba(37,211,102,.4);
  letter-spacing: .3px;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
  animation: slideUp .4s cubic-bezier(.36,.07,.19,.97) both;
}

#wa-btn.visible {
  display: flex;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1">
  <div class="card-wrap">
    <div class="shimmer-ring"></div>
    <div class="card">
      <span class="emoji-top">🥺</span>
      <h1>aku minta maaf ya sayang…</h1>
      <p>beneran dari hati, bukan basa-basi 💕</p>

      <div class="btn-area">
        <button id="yes">iya dimaafin 💖</button>
        <button id="no">enggak 😤</button>
      </div>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2">
  <p class="magic-label">✨ kalkulator ajaib ✨</p>

  <div class="calc-shell">
    <input type="text" id="display" readonly value="">

    <div class="calc-grid">
      <button class="calc-btn" onclick="add('7')">7</button>
      <button class="calc-btn" onclick="add('8')">8</button>
      <button class="calc-btn" onclick="add('9')">9</button>
      <button class="calc-btn op" onclick="add('÷')">÷</button>

      <button class="calc-btn" onclick="add('4')">4</button>
      <button class="calc-btn" onclick="add('5')">5</button>
      <button class="calc-btn" onclick="add('6')">6</button>
      <button class="calc-btn op" onclick="add('×')">×</button>

      <button class="calc-btn" onclick="add('1')">1</button>
      <button class="calc-btn" onclick="add('2')">2</button>
      <button class="calc-btn" onclick="add('3')">3</button>
      <button class="calc-btn op" onclick="add('−')">−</button>

      <button class="calc-btn" onclick="add('0')">0</button>
      <button class="calc-btn" onclick="add('.')">.</button>
      <button class="calc-btn cl" onclick="clearDisp()">C</button>
      <button class="calc-btn op" onclick="add('+')">+</button>

      <button class="calc-btn eq" style="grid-column:span 4" onclick="showResult()">=</button>
    </div>
  </div>

  <p class="result-note" id="result-note">coba tekan = dulu 🌸</p>

  <a id="wa-btn" href="#" target="_blank">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    kirim "i love you too" 💚
  </a>
</div>

<!-- ERROR POPUP (tombol tidak) -->
<div id="error-popup">
  <div class="error-backdrop" onclick="closeError()"></div>
  <div class="error-box">
    <span class="error-icon">⚠️</span>
    <div class="error-title">Error 404</div>
    <div class="error-msg">Pilihan ini tidak tersedia 😤</div>
    <div class="error-sub">maaf ya, tombol "tidak" lagi error terus nih…</div>
    <button class="error-btn" onclick="closeError()">oke deh, maafin aja 💖</button>
  </div>
</div>

<script>
/* ── PETALS ── */
const PETALS = ['🌸','🌷','🩷','✿','💗','🌺','💮'];

function spawnPetal() {
  const el = document.createElement('div');
  el.classList.add('petal');
  el.textContent = PETALS[Math.floor(Math.random() * PETALS.length)];

  const size = 14 + Math.random() * 14;
  el.style.fontSize = size + 'px';
  el.style.left = (Math.random() * 100) + 'vw';

  const dur = 5 + Math.random() * 6;
  el.style.animationDuration = dur + 's';

  const sway = (Math.random() * 80 - 40) + 'px';
  el.style.setProperty('--sway', sway);

  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 200);
}

setInterval(spawnPetal, 350);

/* ── NO BUTTON ESCAPE ── */
const noBtn  = document.getElementById('no');
const btnArea = noBtn.parentElement;

function escapeNo() {
  const areaW = btnArea.offsetWidth;
  const areaH = btnArea.offsetHeight;
  const btnW  = noBtn.offsetWidth;
  const btnH  = noBtn.offsetHeight;

  const maxX = areaW - btnW;
  const maxY = areaH - btnH;

  const newX = Math.random() * maxX;
  const newY = Math.random() * maxY;

  noBtn.style.left  = newX + 'px';
  noBtn.style.top   = newY + 'px';
  noBtn.style.right = 'auto';
}

noBtn.addEventListener('mouseover', escapeNo);
noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); escapeNo(); }, { passive: false });

// After 5 escape attempts, clicking no shows error popup
let noClickCount = 0;
noBtn.addEventListener('click', () => {
  noClickCount++;
  if (noClickCount >= 3) {
    document.getElementById('error-popup').style.display = 'flex';
  } else {
    escapeNo();
  }
});

function closeError() {
  document.getElementById('error-popup').style.display = 'none';
}

/* ── YES → PAGE 2 ── */
document.getElementById('yes').addEventListener('click', () => {
  document.getElementById('page1').style.display = 'none';
  const p2 = document.getElementById('page2');
  p2.style.display = 'flex';
});

/* ── CALCULATOR ── */
const disp = document.getElementById('display');

function add(v) {
  if (disp.value.length > 14) return;
  disp.value += v;
}

function clearDisp() {
  disp.value = '';
  disp.classList.remove('love-state');
  document.getElementById('wa-btn').classList.remove('visible');
  document.getElementById('result-note').style.display = '';
}

function showResult() {
  disp.value = 'I LOVE YOU MILAA 💐';
  disp.classList.add('love-state');
  // show WA button
  const waBtn = document.getElementById('wa-btn');
  const msg = encodeURIComponent('i love you too 💖🌸');
  waBtn.href = 'https://wa.me/6285150960915?text=' + msg;
  waBtn.classList.add('visible');
  document.getElementById('result-note').style.display = 'none';
  // burst of petals
  for (let i = 0; i < 20; i++) {
    setTimeout(spawnPetal, i * 70);
  }
}
</script>
</body>
</html>
