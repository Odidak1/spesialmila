<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maafin Aku 🥺</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

/* halaman 1 */
#page1 {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.card {
    width: 100%;
    max-width: 350px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(255,255,255,0.1);
}

h1 {
    font-size: 20px;
    margin-bottom: 20px;
    line-height: 1.4;
    text-shadow: 0 0 10px rgba(255,255,255,0.7);
}

/* tombol */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
}

#yes {
    background: #00c853;
    color: white;
    box-shadow: 0 0 10px #00c853;
}

#yes:active {
    transform: scale(0.95);
}

#no {
    background: #d50000;
    color: white;
    position: absolute;
    box-shadow: 0 0 10px #d50000;
}

/* halaman 2 */
#page2 {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 20px;
}

.magic-text {
    margin-bottom: 15px;
    font-size: 14px;
    text-align: center;
    color: #fff;
    text-shadow: 0 0 10px #fff;
}

/* kalkulator */
.calculator {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255,255,255,0.1);
}

#display {
    width: 100%;
    height: 45px;
    margin-bottom: 10px;
    text-align: right;
    font-size: 18px;
    padding: 8px;
    border: none;
    border-radius: 10px;
    background: #000;
    color: #0f0;
    box-shadow: inset 0 0 10px rgba(0,255,0,0.3);
}

.calc-btn {
    width: 22%;
    height: 50px;
    margin: 1%;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #222;
    color: white;
    cursor: pointer;
}

.calc-btn:active {
    background: #333;
}
</style>
</head>

<body>

<!-- halaman 1 -->
<div id="page1">
    <div class="card">
        <h1>aku minta maaf yaa 🥺<br>apakah di maafin?</h1>
        <button id="yes">iya dimaafin 💖</button>
        <button id="no">tidak 😡</button>
    </div>
</div>

<!-- halaman 2 -->
<div id="page2">
    <div class="magic-text">✨ coba gunakan kalkulator ajaib ini ✨</div>

    <div class="calculator">
        <input type="text" id="display" disabled><br>

        <button class="calc-btn" onclick="add('1')">1</button>
        <button class="calc-btn" onclick="add('2')">2</button>
        <button class="calc-btn" onclick="add('3')">3</button>
        <button class="calc-btn" onclick="add('+')">+</button>

        <button class="calc-btn" onclick="add('4')">4</button>
        <button class="calc-btn" onclick="add('5')">5</button>
        <button class="calc-btn" onclick="add('6')">6</button>
        <button class="calc-btn" onclick="add('-')">-</button>

        <button class="calc-btn" onclick="add('7')">7</button>
        <button class="calc-btn" onclick="add('8')">8</button>
        <button class="calc-btn" onclick="add('9')">9</button>
        <button class="calc-btn" onclick="add('*')">*</button>

        <button class="calc-btn" onclick="add('0')">0</button>
        <button class="calc-btn" onclick="clearDisplay()">C</button>
        <button class="calc-btn" onclick="result()">=</button>
        <button class="calc-btn" onclick="add('/')">/</button>
    </div>
</div>

<script>
// tombol NO kabur
const noBtn = document.getElementById("no");

noBtn.addEventListener("touchstart", moveNo);
noBtn.addEventListener("mouseover", moveNo);

function moveNo() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// tombol YES
document.getElementById("yes").onclick = () => {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "flex";
};

// kalkulator
let display = document.getElementById("display");

function add(val) {
    display.value += val;
}

function clearDisplay() {
    display.value = "";
}

function result() {
    display.value = "I LOVE YOU MILAA 💚";
}
</script>

</body>
</html>
