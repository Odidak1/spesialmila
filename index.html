<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Maafin Aku 🥺</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #fcb69f);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* halaman 1 */
#page1 {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    color: white;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.9);}
    to {opacity: 1; transform: scale(1);}
}

h1 {
    margin-bottom: 20px;
    font-weight: 600;
}

/* tombol */
button {
    padding: 12px 22px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.25s;
}

#yes {
    background: linear-gradient(45deg, #4CAF50, #66ff99);
    color: white;
}

#yes:hover {
    transform: scale(1.1);
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

#no {
    background: linear-gradient(45deg, #ff4d4d, #ff8080);
    color: white;
    position: absolute;
}

/* halaman 2 */
#page2 {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.magic-text {
    color: white;
    margin-bottom: 15px;
    font-size: 16px;
    opacity: 0.95;
    animation: fadeIn 1s ease;
}

/* kalkulator */
.calculator {
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

#display {
    width: 220px;
    height: 45px;
    margin-bottom: 10px;
    text-align: right;
    font-size: 18px;
    padding: 8px;
    border: none;
    border-radius: 8px;
}

.calc-btn {
    width: 50px;
    height: 50px;
    margin: 4px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

.calc-btn:hover {
    transform: scale(1.1);
    background: #ddd;
}
</style>
</head>

<body>

<!-- halaman 1 -->
<div id="page1">
    <div class="card">
        <h1>aku minta maaf yaa 🥺<br>apakah di maafin?</h1>
        <button id="yes">iya dimaafin 💖</button>
        <button id="no">tidak 😡</button>
    </div>
</div>

<!-- halaman 2 -->
<div id="page2">
    <div class="magic-text">✨ coba gunakan kalkulator ajaib ini ✨</div>

    <div class="calculator">
        <input type="text" id="display" disabled><br>

        <button class="calc-btn" onclick="add('1')">1</button>
        <button class="calc-btn" onclick="add('2')">2</button>
        <button class="calc-btn" onclick="add('3')">3</button>
        <button class="calc-btn" onclick="add('+')">+</button><br>

        <button class="calc-btn" onclick="add('4')">4</button>
        <button class="calc-btn" onclick="add('5')">5</button>
        <button class="calc-btn" onclick="add('6')">6</button>
        <button class="calc-btn" onclick="add('-')">-</button><br>

        <button class="calc-btn" onclick="add('7')">7</button>
        <button class="calc-btn" onclick="add('8')">8</button>
        <button class="calc-btn" onclick="add('9')">9</button>
        <button class="calc-btn" onclick="add('*')">*</button><br>

        <button class="calc-btn" onclick="add('0')">0</button>
        <button class="calc-btn" onclick="clearDisplay()">C</button>
        <button class="calc-btn" onclick="result()">=</button>
        <button class="calc-btn" onclick="add('/')">/</button>
    </div>
</div>

<script>
// tombol NO kabur
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// tombol YES
document.getElementById("yes").onclick = () => {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "flex";
};

// kalkulator
let display = document.getElementById("display");

function add(val) {
    display.value += val;
}

function clearDisplay() {
    display.value = "";
}

function result() {
    display.value = "I LOVE YOU MILAA 💖";
}
</script>

</body>
</html>
